leton to _model--><path d="M108.49,88.53 C103.51,95.07 97.24,103.31 91.46,110.9 " fill="none" id="singleton-_model" style="stroke: #000000; stroke-width: 0.5;"/><polygon fill="#000000" points="88.47,114.82,97.1,110.0741,91.4951,110.8389,90.7302,105.234,88.47,114.82" style="stroke: #000000; stroke-width: 0.5;"/><!--link utils.ts to _model--><path d="M48.2,88.53 C52.06,94.94 56.9,102.99 61.4,110.46 " fill="none" id="utils.ts-_model" style="stroke: #000000; stroke-width: 0.5;"/><polygon fill="#000000" points="63.97,114.73,62.7456,104.9575,61.387,110.4488,55.8957,109.0903,63.97,114.73" style="stroke: #000000; stroke-width: 0.5;"/><!--
@startuml

scale max 1920 width
top to bottom direction

skinparam nodesep 12
skinparam ranksep 24
skinparam monochrome true
skinparam shadowing false
skinparam defaultFontName Tahoma
skinparam defaultFontSize 12
skinparam roundCorner 6
skinparam dpi 150
skinparam arrowColor black
skinparam arrowThickness 0.5
skinparam packageTitleAlignment left

skinparam usecase {
  borderThickness 0.5
}

skinparam rectangle {
  borderThickness 0.5
}

skinparam component {
  borderThickness 1
}


(base.component)
rectangle "component" as _component
(<b>main.ts</b>)
(main.view)
rectangle "model" as _model
(singleton)
(utils.ts)

_component - -> (base.component)
(<b>main.ts</b>) -[thickness=1]> (main.view)
(<b>main.ts</b>) -[thickness=1]> (utils.ts)
(main.view) - -> _component
(main.view) - -> (singleton)
(singleton) - -> _model
(utils.ts) - -> _model

@enduml

