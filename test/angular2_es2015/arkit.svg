@startuml

scale max 1920 width
top to bottom direction

skinparam nodesep 14
skinparam ranksep 28
skinparam monochrome true
skinparam shadowing false
skinparam defaultFontName Tahoma
skinparam defaultFontSize 12
skinparam roundCorner 6
skinparam dpi 150
skinparam arrowColor black
skinparam arrowThickness 0.5
skinparam packageTitleAlignment left

skinparam usecase {
  borderThickness 0.5
}

skinparam rectangle {
  borderThickness 0.5
}

skinparam component {
  borderThickness 1
}


(app.component)
(components)
(<b>main</b>)
(<b>main.bundle</b>)
(main.module)
(pipes)
(routes)
(todo-footer.component)
(todo-header.component)
(todo-item.component)
(todo-list.component)
(todo-store.service)
rectangle "todo.model" as _todo_model
(trim.pipe)
(<b>webpack.config</b>)


(components) - -> (app.component)
(components) - -> (todo-footer.component)
(components) - -> (todo-header.component)
(components) - -> (todo-item.component)
(components) - -> (todo-list.component)
(<b>main</b>) -[thickness=1]> (main.module)
(main.module) - -> (components)
(main.module) - -> (pipes)
(main.module) - -> (routes)
(main.module) - -> (todo-store.service)
(pipes) - -> (trim.pipe)
(routes) - -> (todo-list.component)
(todo-footer.component) - - -> (todo-store.service)
(todo-header.component) - - -> (todo-store.service)
(todo-list.component) - - -> (todo-store.service)
(todo-store.service) - -> _todo_model

@enduml

