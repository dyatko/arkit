@startuml

scale max 1920 width
top to bottom direction

skinparam nodesep 13
skinparam ranksep 26
skinparam monochrome true
skinparam shadowing false
skinparam defaultFontName Tahoma
skinparam defaultFontSize 12
skinparam roundCorner 6
skinparam dpi 150
skinparam arrowColor black
skinparam arrowThickness 0.5
skinparam packageTitleAlignment left

skinparam usecase {
  borderThickness 0.5
}

skinparam rectangle {
  borderThickness 0.5
}

skinparam component {
  borderThickness 1
}


(application)
rectangle "<b>express</b>" as _express
(init)
(layer)
(query)
(request)
(response)
(route)
(router)
(utils)
(view)


(application) - -> (init)
(application) - -> (query)
(application) - -> (router)
(application) - -> (utils)
(application) - -> (view)
_express -[thickness=1]> (application)
_express -[thickness=1]> (query)
_express -[thickness=1]> (request)
_express -[thickness=1]> (response)
_express -[thickness=1]> (route)
_express -[thickness=1]> (router)
(response) - -> (utils)
(route) - -> (layer)
(router) - -> (layer)
(router) - -> (route)

@enduml

